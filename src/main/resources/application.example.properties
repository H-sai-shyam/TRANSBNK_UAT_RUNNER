server.port=8081

# ===== Database (UAT) =====
# Update host/port and credentials for your environment.
spring.datasource.url=jdbc:mariadb://<host>:<port>/transbnk?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Kolkata&tcpKeepAlive=true&connectTimeout=5000&socketTimeout=60000&useServerPrepStmts=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048
spring.datasource.username=<db_user>
spring.datasource.password=<db_password>
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.max-lifetime=1500000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.connection-test-query=SELECT 1

# ===== Logging =====
logging.level.root=INFO
logging.level.com.example.transbnk_uat_runner=DEBUG

# ===== TransBnk / TrustHub =====
transbnk.base-url=https://sandbox-api.trusthub.in
transbnk.api-key=<default_api_key>
# Optional: if bank validation uses a different key than the default.
transbnk.bank-account-validation-api-key=<bank_account_validation_api_key>
transbnk.entity-id=<entity_uuid>
transbnk.program-id=524
transbnk.nach-program-id=113

# ===== Wrapper / Protective Layer =====
wrapper.token-expiry-minutes=15
# When true, all /api/{apiName} requests must use encData and responses are returned as encData.
wrapper.payload-required=false
# Used in the token payload string (do not share).
wrapper.transaction-password=<wrapper_transaction_password>
# AES key + IV must be Base64 strings (AES/CBC/PKCS5Padding). IV must decode to 16 bytes.
wrapper.transaction-aes-key=<base64_aes_key>
wrapper.transaction-iv=<base64_iv_16_bytes>
# Optional: encrypt/decrypt request/response payloads (defaults to transaction key/iv).
wrapper.payload-aes-key=${wrapper.transaction-aes-key}
wrapper.payload-iv=${wrapper.transaction-iv}

